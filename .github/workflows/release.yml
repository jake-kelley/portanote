name: Release

# Push a version tag (e.g. `git tag v1.0.1 && git push origin v1.0.1`) to build
# the binaries and attach them to a GitHub Release automatically.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        run: |
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o portanote-windows-amd64.exe .
          GOOS=darwin  GOARCH=arm64 go build -ldflags="-s -w" -o portanote-macos-arm64 .

      # the in-app updater verifies downloads against this file
      - name: Checksums
        run: sha256sum portanote-windows-amd64.exe portanote-macos-arm64 > sha256sums.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            portanote-windows-amd64.exe
            portanote-macos-arm64
            sha256sums.txt
            scripts/get-tools.ps1
            scripts/get-tools.sh
            scripts/install.ps1
            scripts/install.sh
          generate_release_notes: true
